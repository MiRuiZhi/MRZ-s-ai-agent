events {}

http {
    upstream agent_api {
        server agent-api:8000;
    }

    upstream tool_runtime {
        server tool-runtime:1601;
    }

    upstream reactor_ui {
        server ui:80;
    }

    server {
        listen 80;
        client_max_body_size 200m;

        location / {
            proxy_pass http://reactor_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /web/ {
            proxy_pass http://agent_api;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        location /AutoAgent {
            proxy_pass http://agent_api;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://agent_api;
            proxy_set_header Host $host;
        }

        location /data/ {
            proxy_pass http://agent_api;
            proxy_set_header Host $host;
        }

        location /tool/ {
            rewrite ^/tool/(.*)$ /$1 break;
            proxy_pass http://tool_runtime;
            proxy_set_header Host $host;
        }
    }
}
